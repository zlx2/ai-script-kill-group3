server:
  port: 8080

spring:
  application:
    name: script-murder
  datasource:
    url: jdbc:mysql://127.0.0.1:43061/script_kill?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: root
    password: script_kill_123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: 127.0.0.1
      port: 6380
      password:
      database: 0
      connect-timeout: 2000
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  ai:
    dashscope:
      api-key: ${AI_API_KEY:sk-placeholder}
      chat:
        options:
          model: deepseek-chat
  mail:
    host: smtp.qq.com
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    port: 465
    properties:
      mail:
        smtp:
          ssl:
            enable: true
          auth: true
        socketFactory:
          class: javax.net.ssl.SSLSocketFactory

# 腾讯云 COS 配置（上传图片/封面用）
cos:
  secret-id: ${COS_SECRET_ID:}
  secret-key: ${COS_SECRET_KEY:}
  region: ap-guangzhou
  bucket-name: script-murder
  custom-domain:

# TTS 配置（语音用）
tts:
  baidu:
    api-key:
    secret-key:

logging:
  level:
    com.wn: DEBUG
